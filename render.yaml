services:
  - type: web
    name: ccsun-todolist
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: "sunyayiii/ccsun-todolist"
      - key: GITHUB_BRANCH
        value: "main"
      - key: SYNC_INTERVAL
        value: "600"
    plan: free
    autoDeploy: true
